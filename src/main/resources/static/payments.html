<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payments - HotelM</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body>
<div id="app-topbar"></div>
<div class="container">
    <h2>Payments</h2>
    <div id="payments-message" class="notice">Track and submit payment information.</div>

    <div class="card">
        <h3>Create payment</h3>
        <form id="payment-form">
            <label for="payment-booking-id">Booking</label>
            <select id="payment-booking-id" required></select>

            <label for="payment-method">Method</label>
            <select id="payment-method" required>
                <option value="CARD">Card</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
                <option value="CASH">Cash</option>
            </select>

            <label for="payment-amount">Amount</label>
            <input id="payment-amount" type="number" min="0" step="0.01" required />

            <button class="primary" type="submit">Submit payment</button>
        </form>
    </div>

    <div class="card" style="margin-top:16px;">
        <h3>My payments</h3>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Booking</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="payments-body">
                <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/script/api/baseApi.js"></script>
<script src="/script/api/bookingApi.js"></script>
<script src="/script/api/paymentApi.js"></script>
<script src="/script/authStore.js"></script>
<script src="/script/guard.js"></script>
<script src="/script/app-shell.js"></script>
<script src="/script/payments.js"></script>
</body>
</html>
