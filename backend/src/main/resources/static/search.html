<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Rooms - HotelM</title>
    <link rel="stylesheet" href="assets/css/app.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app-topbar"></div>
<div class="container">
    <h2 data-i18n="rooms_search_title">Search room</h2>
    <div class="actions">
        <input id="q" placeholder="Keyword" />
        <input id="capacity" type="number" placeholder="Min capacity" />
        <button id="search-btn" class="primary" type="button" data-i18n="btn_search">Search</button>
    </div>
    <div id="search-results" class="grid"></div>
</div>

<script src="script/api/baseApi.js"></script>
<script src="script/api/roomApi.js"></script>
<script src="script/authStore.js"></script>
<script src="script/app-shell.js"></script>
<script src="script/search.js"></script>
</body>
</html>
