<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0f0e0c;
            --panel:     #1a1814;
            --border:    #2e2b25;
            --gold:      #c9a84c;
            --gold-soft: #e8c97a;
            --text:      #f0ece3;
            --muted:     #7a7060;
            --error:     #e07070;
            --success:   #6fcf97;
            --radius:    12px;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            padding: 2rem;
            background-image:
                    radial-gradient(ellipse 60% 50% at 80% 20%, rgba(201,168,76,0.07) 0%, transparent 60%),
                    radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 3rem 2.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.05);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .logo-icon {
            width: 48px; height: 48px;
            border: 1.5px solid var(--gold);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 0.8rem;
            color: var(--gold);
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .logo p {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 0.2rem;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 1.8rem 0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        input::placeholder { color: var(--muted); font-size: 0.88rem; }

        input:focus, select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
        }

        input.error-field { border-color: var(--error); }

        .field-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.35rem;
            display: none;
        }
        .field-error.show { display: block; }

        select option { background: #1a1814; color: var(--text); }

        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            font-size: 0.8rem;
        }

        .btn {
            width: 100%;
            margin-top: 1.5rem;
            padding: 0.9rem;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--gold), #a87832);
            color: #0f0e0c;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn.loading .btn-text { display: none; }
        .btn.loading .spinner { display: block; }

        .toast {
            display: none;
            margin-top: 1.2rem;
            padding: 0.9rem 1.1rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            animation: fadeUp 0.3s ease both;
        }
        .toast.success { background: rgba(111,207,151,0.1); border: 1px solid rgba(111,207,151,0.25); color: var(--success); display: block; }
        .toast.error   { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.25); color: var(--error);   display: block; }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--muted);
        }
        .login-link a { color: var(--gold-soft); text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">✦</div>
        <h1>Grand Hotel</h1>
        <p>Tạo tài khoản mới</p>
    </div>

    <div class="divider"></div>

    <div class="form-group">
        <label for="fullName">Họ và tên</label>
        <input type="text" id="fullName" placeholder="Nguyễn Văn A" />
        <div class="field-error" id="err-fullName">Vui lòng nhập họ tên</div>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@email.com" />
        <div class="field-error" id="err-email">Email không hợp lệ</div>
    </div>

    <div class="form-group">
        <label for="phoneNumber">Số điện thoại</label>
        <input type="tel" id="phoneNumber" placeholder="0909 123 456" />
        <div class="field-error" id="err-phoneNumber">Vui lòng nhập số điện thoại</div>
    </div>

    <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" />
        <div class="field-error" id="err-password">Mật khẩu tối thiểu 6 ký tự</div>
    </div>

    <div class="form-group">
        <label for="role">Vai trò</label>
        <div class="select-wrapper">
            <select id="role">
                <option value="USER">User</option>
                <option value="RECEPTIONIST">Receptionist</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>
    </div>

    <button class="btn" id="submitBtn" onclick="submitForm()">
        <span class="btn-text">Đăng ký</span>
        <div class="spinner"></div>
    </button>

    <div class="toast" id="toast"></div>

    <p class="login-link">Đã có tài khoản? <a href="#">Đăng nhập</a></p>
</div>

<script>
    // ĐỔI URL NÀY THÀNH ĐỊA CHỈ BACKEND
    const API_URL = "http://localhost:8080/users";

    function validate() {
        let valid = true;

        const fields = [
            { id: "fullName",    errId: "err-fullName",    check: v => v.trim().length > 0 },
            { id: "email",       errId: "err-email",       check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
            { id: "phoneNumber", errId: "err-phoneNumber", check: v => v.trim().length >= 9 },
            { id: "password",    errId: "err-password",    check: v => v.length >= 6 },
        ];

        fields.forEach(({ id, errId, check }) => {
            const input = document.getElementById(id);
            const err   = document.getElementById(errId);
            const ok    = check(input.value);
            input.classList.toggle("error-field", !ok);
            err.classList.toggle("show", !ok);
            if (!ok) valid = false;
        });

        return valid;
    }

    function showToast(msg, type) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast " + type;
    }

    async function submitForm() {
        // 1. Validate trước
        if (!validate()) return;

        // 2. Gom dữ liệu từ form thành object JSON
        const payload = {
            fullName:    document.getElementById("fullName").value.trim(),
            email:       document.getElementById("email").value.trim(),
            phoneNumber: document.getElementById("phoneNumber").value.trim(),
            password:    document.getElementById("password").value,
            role:        document.getElementById("role").value,
        };

        // 3. Gọi API bằng fetch
        const btn = document.getElementById("submitBtn");
        btn.classList.add("loading");
        btn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method:  "POST",
                headers: { "Content-Type": "application/json" },  // báo backend đây là JSON
                body:    JSON.stringify(payload),                  // chuyển object → chuỗi JSON
            });

            if (response.ok) {
                const data = await response.json();  // nhận user vừa tạo từ backend
                showToast("✅ Đăng ký thành công! Xin chào " + data.fullName, "success");
                document.querySelectorAll("input").forEach(i => i.value = "");
            } else {
                const msg = await response.text();
                showToast("❌ " + (msg || "Đăng ký thất bại"), "error");
            }

        } catch (err) {
            // Lỗi kết nối (backend chưa chạy, sai URL...)
            showToast("❌ Không kết nối được server. Kiểm tra backend!", "error");
        } finally {
            btn.classList.remove("loading");
            btn.disabled = false;
        }
    }

    // Cho phép nhấn Enter để submit
    document.addEventListener("keydown", e => {
        if (e.key === "Enter") submitForm();
    });
</script>
</body>
</html>
