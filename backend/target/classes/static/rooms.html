<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - SOT Resort & Hotel</title>

    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <link rel="stylesheet" href="assets/css/profile.css" />
  </head>

  <body>
    <header class="topbar">
      <a href="index.html" class="topbar-logo">
        <img src="assets/image/logo.svg" alt="SOT Logo" />
        <span>SOT</span>
      </a>
      <div class="topbar-right">
        <a href="index.html" class="back-home"
          ><i class="fas fa-arrow-left"></i
          ><span data-i18n="profile_back">Back to Home</span></a
        >
        <div class="topbar-greeting">
          <span data-i18n="profile_welcome">Welcome,</span>
          <strong id="topbar-username">Guest</strong>
        </div>
        <a href="account.html" class="topbar-avatar"
          ><i class="fas fa-user"></i
        ></a>

        <div class="notification-dropdown">
          <button class="notification-btn" onclick="toggleNotification(event)">
            <i class="fas fa-bell"></i>
            <span class="notification-badge"></span>
          </button>
          <div class="notification-content" id="notificationMenu">
            <div class="notification-header" data-i18n="notification_header">
              Notifications
            </div>
            <div class="notification-list">
              <div class="notification-empty" data-i18n="notification_empty">
                No new notifications
              </div>
            </div>
          </div>
        </div>
        <button
          id="lang-toggle-btn"
          onclick="toggleLanguage()"
          title="Switch to Vietnamese"
        >
          <span class="lang-flag">🇻🇳</span>
          <span class="lang-label">VI</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
          <div class="sidebar-name" id="sidebar-username">Loading…</div>
          <div class="sidebar-role" id="sidebar-role">—</div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item" onclick="location.href = 'account.html'">
            <i class="fas fa-user-circle"></i
            ><span data-i18n="sidebar_account">My Account</span>
          </button>
          <!-- <button class="nav-item" onclick="location.href='dashboard.html'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button> -->
          <button class="nav-item" onclick="location.href = 'bookings.html'">
            <i class="fas fa-calendar-check"></i>
            <span data-i18n="sidebar_bookings">My Bookings</span>
          </button>
          <button class="nav-item" onclick="location.href = 'rooms.html'">
            <i class="fas fa-bed"></i>
            <span data-i18n="sidebar_rooms">Browse Rooms</span>
          </button>

          <div class="sidebar-divider"></div>

          <button class="nav-item" onclick="location.href = 'payments.html'">
            <i class="fas fa-credit-card"></i>
            <span data-i18n="sidebar_payments">Payments</span>
          </button>
          <button class="nav-item" onclick="location.href = 'refunds.html'">
            <i class="fas fa-undo"></i>
            <span data-i18n="sidebar_refunds">Refund Requests</span>
          </button>
          <button class="nav-item" onclick="location.href = 'reviews.html'">
            <i class="fas fa-star"></i>
            <span data-i18n="sidebar_reviews">Room Reviews</span>
          </button>

          <div class="sidebar-divider"></div>
          <button class="nav-item danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i>
            <span data-i18n="sidebar_signout">Sign Out</span>
          </button>
        </nav>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <div class="page-header">
          <h1 data-i18n="rooms_title">Browse Rooms</h1>
          <p data-i18n="rooms_desc">Find the perfect room for your stay</p>
        </div>

        <div class="card filter-card" style="padding: 24px !important">
          <div
            id="toggle-filter"
            style="
              cursor: pointer;
              display: flex;
              justify-content: space-between;
              align-items: center;
              border-bottom: 1px solid var(--border);
              padding-bottom: 12px;
            "
          >
            <div class="card-title" style="margin-bottom: 0; font-size: 1.1rem">
              <i class="fas fa-filter" style="margin-right: 8px"></i>  <span data-i18n="filter_title">Filter</span>
            </div>
            <i
              class="fas fa-chevron-up"
              id="filter-chevron"
              style="transition: 0.3s; color: var(--primary)"
            ></i>
          </div>

          <div id="filter-container" style="transition: all 0.3s ease">
            <form
              id="filter-form"
              style="
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 24px;
                margin-top: 20px;
                align-items: end;
              "
            >
              <div class="form-field">
                <label
                  class="form-label"
                  style="display: block; margin-bottom: 10px"
                  data-i18n="filter_type"
                  >Room Type</label
                >
                <select id="filter-type" class="form-select">
                  <option value="" data-i18n="filter_type_all">All Room Types</option>
                </select>
              </div>

              <div class="form-field">
                <label
                  class="form-label"
                  style="display: block; margin-bottom: 10px"
                  data-i18n="filter_capacity"
                  >Capacity</label
                >
                <input
                  type="number"
                  id="filter-capacity"
                  class="form-input"
                  placeholder="Number of guests..."
                  min="1"
                  data-i18n="filter_capacity_placeholder"
                />
              </div>

              <div class="form-field">
                <label
                  class="form-label"
                  style="display: block; margin-bottom: 10px"
                  data-i18n="filter_price"
                  >Price Range</label
                >
                <select id="filter-price" class="form-select">
                  <option value="" data-i18n="filter_price_all">All Prices</option>
                  <option value="0-500000" data-i18n="filter_price_1">Under 500,000 VND</option>
                  <option value="500000-1000000" data-i18n="filter_price_2">
                    500,000 - 1,000,000 VND
                  </option>
                  <option value="1000000-999999999" data-i18n="filter_price_over">Over 1,000,000 VND</option>
                </select>
              </div>

              <div class="form-field">
                <label
                  class="form-label"
                  style="display: block; margin-bottom: 10px"
                  data-i18n="filter_rating"
                  >Rating</label
                >
                <select id="filter-rating" class="form-select">
                  <option value="" data-i18n="filter_rating_all">All Ratings</option>
                  <option value="5" data-i18n="filter_rating_5">5 Stars</option>
                  <option value="4" data-i18n="filter_rating_4">4 Stars and Up</option>
                  <option value="3" data-i18n="filter_rating_3">3 Stars and Up</option>
                </select>
              </div>

              <div class="form-field">
                <button
                  type="button"
                  id="btn-reset"
                  class="btn-secondary"
                  style="
                    width: 100%;
                    height: 42px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    gap: 8px;
                  "
                >
                  <i class="fas fa-redo-alt" style="font-size: 0.8rem"></i> <span data-i18n="filter_reset">Reset Filters</span>
                  Delete All Filters
                </button>
              </div>
            </form>
          </div>
        </div>

        <div id="rooms-list" class="rooms-grid">
          <!-- JS render tại đây -->
        </div>
      </main>
    </div>

    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="closeSidebar()"
    ></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <!-- Scripts -->
    <script src="script/api/baseApi.js"></script>
    <script src="script/api/roomApi.js"></script>
    <script src="script/api/roomTypeApi.js"></script>
    <script src="script/api/userApi.js"></script>

    <script src="script/authStore.js"></script>
    <script src="script/guard.js"></script>
    <script src="script/app-shell.js"></script>

    <script src="script/rooms.js"></script>
    <script src="script/language.js"></script>
  </body>
</html>
