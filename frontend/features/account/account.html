<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Account - SOT Resort & Hotel</title>
    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/profile.css" />
</head>

<body>

    <header class="topbar">
        <a href="../../pages/index.html" class="topbar-logo">
            <img src="assets/image/logo.svg" alt="SOT Logo">
            <span>SOT</span>
        </a>
        <div class="topbar-right">
            <a href="../../pages/index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="topbar-greeting">Welcome, <strong id="topbar-username">Guest</strong></div>
            <a href="account.html" class="topbar-avatar"><i class="fas fa-user"></i>
</a>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-user">
                <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
                <div class="sidebar-name" id="sidebar-username">Loading…</div>
                <div class="sidebar-role" id="sidebar-role">—</div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-panel="panel-account" onclick="switchPanel(this)">
                    <i class="fas fa-user-circle"></i> My Account
                </button>
                <button class="nav-item" onclick="location.href='dashboard.html'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
                <button class="nav-item" onclick="location.href='bookings.html'">
                    <i class="fas fa-calendar-check"></i> My Bookings
                </button>
                <button class="nav-item" onclick="location.href='rooms.html'">
                    <i class="fas fa-bed"></i> Browse Rooms
                </button>

                <div class="sidebar-divider"></div>
                <button class="nav-item danger" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> Sign Out
                </button>
            </nav>
        </aside>

        <main class="main">
            <div id="panel-account" class="panel active">
                <div class="page-header">
                    <h1>My Account</h1>
                    <p>Manage your personal information</p>
                </div>

                <div class="profile-grid">
                    <div class="card">
                        <div class="card-title"><i class="fas fa-id-card"></i> Personal Information</div>
                        <div class="info-field">
                            <div class="info-label">Full Name</div>
                            <div class="info-value" id="profile-name">—</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">Email</div>
                            <div class="info-value" id="profile-email">—</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">Phone Number</div>
                            <div class="info-value" id="profile-phone">—</div>
                        </div>
                        <div class="info-field">
                            <div class="info-label">Role</div>
                            <div class="info-value" id="profile-role">—</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-title"><i class="fas fa-concierge-bell"></i> Quick Actions</div>
                        <div style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">
                            <button class="btn-secondary" onclick="location.href='bookings.html'">
                                <i class="fas fa-history"></i> View My Bookings
                            </button>
                            <button class="btn-secondary" onclick="location.href='create-booking.html'">
                                <i class="fas fa-calendar-plus"></i> Create New Booking
                            </button>
                            <button class="btn-secondary" onclick="location.href='payments.html'">
                                <i class="fas fa-credit-card"></i> Payment History
                            </button>
                            <button class="btn-secondary" onclick="location.href='refunds.html'">
                                <i class="fas fa-undo"></i> Refund Requests
                            </button>
                            <button class="btn-secondary" onclick="location.href='reviews.html'">
                                <i class="fas fa-star"></i> Room Reviews
                            </button>
                            <button class="btn-secondary" onclick="location.href='rooms.html'">
                                <i class="fas fa-bed"></i> Browse Rooms
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <script src="script/api/baseApi.js"></script>
    <script src="script/api/userApi.js"></script>
    <script src="script/authStore.js"></script>
    <script src="script/guard.js"></script>
    <script src="script/account.js"></script>

</body>

</html>
