<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Booking - SOT Resort & Hotel</title>
    <link rel="icon" href="/assets/image/logo.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/profile.css" />
  </head>

  <body>
    <header class="topbar">
      <a href="index.html" class="topbar-logo">
        <img src="assets/image/logo.svg" alt="SOT Logo" />
        <span>SOT</span>
      </a>
      <div class="topbar-right">
        <a href="index.html" class="back-home"
          ><i class="fas fa-arrow-left"></i
          ><span data-i18n="profile_back">Back to Home</span></a
        >
        <div class="topbar-greeting">
          <span data-i18n="profile_welcome">Welcome,</span>
          <strong id="topbar-username">Guest</strong>
        </div>
        <a href="account.html" class="topbar-avatar"
          ><i class="fas fa-user"></i
        ></a>

        <div class="notification-dropdown">
          <button class="notification-btn" onclick="toggleNotification(event)">
            <i class="fas fa-bell"></i>
            <span class="notification-badge"></span>
          </button>
          <div class="notification-content" id="notificationMenu">
            <div class="notification-header" data-i18n="notification_header">
              Notifications
            </div>
            <div class="notification-list">
              <div class="notification-empty" data-i18n="notification_empty">
                No new notifications
              </div>
            </div>
          </div>
        </div>
        <button
          id="lang-toggle-btn"
          onclick="toggleLanguage()"
          title="Switch to Vietnamese"
        >
          <span class="lang-flag">🇻🇳</span>
          <span class="lang-label">VI</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
          <div class="sidebar-name" id="sidebar-username">Loading…</div>
          <div class="sidebar-role" id="sidebar-role">—</div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item" onclick="location.href = 'account.html'">
            <i class="fas fa-user-circle"></i
            ><span data-i18n="sidebar_account">My Account</span>
          </button>
          <!-- <button class="nav-item" onclick="location.href='dashboard.html'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button> -->
          <button class="nav-item" onclick="location.href = 'bookings.html'">
            <i class="fas fa-calendar-check"></i>
            <span data-i18n="sidebar_bookings">My Bookings</span>
          </button>
          <button class="nav-item" onclick="location.href = 'rooms.html'">
            <i class="fas fa-bed"></i>
            <span data-i18n="sidebar_search_rooms">Search Rooms</span>
          </button>
          <button class="nav-item" onclick="location.href = 'create-booking.html'">
            <i class="fas fa-calendar-plus"></i>
            <span data-i18n="sidebar_create_booking">Create Booking</span>
          </button>

          <div class="sidebar-divider"></div>

          <button class="nav-item" onclick="location.href = 'payments.html'">
            <i class="fas fa-credit-card"></i>
            <span data-i18n="sidebar_payments">Payments</span>
          </button>
          <button class="nav-item" onclick="location.href = 'refunds.html'">
            <i class="fas fa-undo"></i>
            <span data-i18n="sidebar_refunds">Refund Requests</span>
          </button>
          <button class="nav-item" onclick="location.href = 'reviews.html'">
            <i class="fas fa-star"></i>
            <span data-i18n="sidebar_reviews">Room Reviews</span>
          </button>

          <div class="sidebar-divider"></div>
          <button class="nav-item danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i>
            <span data-i18n="sidebar_signout">Sign Out</span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <div class="page-header">
          <h1 data-i18n="create_booking_title">Create New Booking</h1>
          <p data-i18n="create_booking_desc">Select room and booking time</p>
        </div>

        <div id="create-booking-message" class="message-box"></div>

        <div class="card booking-card">
          <div class="booking-card-header">
            <i class="fas fa-calendar-plus"></i>
            <div>
              <div class="booking-card-title" data-i18n="booking_details">Booking Details</div>
              <div class="booking-card-sub" data-i18n="booking_sub">
                Fill in the details below to reserve your room
              </div>
            </div>
          </div>

          <form id="create-booking-form">
            <div class="form-field">
              <label class="form-label" for="branchId"
                ><i class="fas fa-map-marker-alt"></i> <span data-i18n="label_branch">Branch</span></label
              >
              <select id="branchId" class="form-select">
                <option value="">-- Select Branch --</option>
              </select>
            </div>
            <div class="form-field">
              <label class="form-label" for="roomId"
                ><i class="fas fa-bed"></i> <span data-i18n="label_room">Room</span></label
              >
              <select id="roomId" class="form-select" required></select>
            </div>

            <div class="form-row">
              <div class="form-field">
                <label class="form-label" for="checkIn"
                  ><i class="fas fa-arrow-right-to-bracket"></i> <span data-i18n="label_checkin">Check In</span></label
                >
                <input
                  id="checkIn"
                  class="form-input"
                  type="datetime-local"
                  required
                />
              </div>
              <div class="form-field">
                <label class="form-label" for="checkOut"
                  ><i class="fas fa-arrow-right-from-bracket"></i> <span data-i18n="label_checkout">Check Out</span></label
                >
                <input
                  id="checkOut"
                  class="form-input"
                  type="datetime-local"
                  required
                />
              </div>
            </div>

            <div class="form-field">
              <label class="form-label" for="note"
                ><i class="fas fa-pen-to-square"></i> <span data-i18n="label_note">Note</span></label
              >
              <textarea
                id="note"
                class="form-textarea"
                rows="4"
                placeholder="Any special requests or notes (optional)" data-i18n="placeholder_note"
              ></textarea>
            </div>

            <div class="booking-actions">
              <button class="btn-primary" type="submit">
                <i class="fas fa-check"></i> <span data-i18n="btn_confirm">Confirm Booking</span>
              </button>
              <button
                class="btn-secondary"
                type="button"
                onclick="location.href = 'bookings.html'"
              >
                <i class="fas fa-arrow-left"></i> <span data-i18n="btn_back_to_list">Back to List</span>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="closeSidebar()"
    ></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <script src="/script/api/baseApi.js"></script>
    <script src="/script/api/branchApi.js"></script>
    <script src="/script/api/roomApi.js"></script>
    <script src="/script/api/bookingApi.js"></script>
    <script src="/script/authStore.js"></script>
    <script src="/script/guard.js"></script>
    <script src="script/app-shell.js"></script>
    <script src="/script/create-booking.js"></script>
    <script src="/script/language.js"></script>
  </body>
</html>
