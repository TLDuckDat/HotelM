<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookings - HotelM</title>
    <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
<div id="app-topbar"></div>
<div class="container">
    <h2>Booking list</h2>

    <div id="bookings-message" class="notice" style="display:none;"></div>

    <div class="card">
        <h3>Create booking</h3>
        <form id="create-booking-form">
            <label for="roomId">Room</label>
            <select id="roomId" required></select>

            <label for="checkIn">Check in</label>
            <input id="checkIn" type="datetime-local" required />

            <label for="checkOut">Check out</label>
            <input id="checkOut" type="datetime-local" required />

            <label for="note">Note</label>
            <textarea id="note" rows="3"></textarea>

            <button class="primary" type="submit">Create booking</button>
        </form>
    </div>

    <div class="table-wrap" style="margin-top: 16px;">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Room</th>
                <th>Check in</th>
                <th>Check out</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="bookings-body">
            <tr><td colspan="7">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="/script/api/baseApi.js"></script>
<script src="/script/api/roomApi.js"></script>
<script src="/script/api/bookingApi.js"></script>
<script src="/script/authStore.js"></script>
<script src="/script/guard.js"></script>
<script src="/script/app-shell.js"></script>
<script src="/script/bookings.js"></script>
</body>
</html>
