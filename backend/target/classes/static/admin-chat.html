<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Chat — SOT Admin</title>
    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/admin.css" />
    <link rel="stylesheet" href="assets/css/admin-chat.css" />
  </head>

  <body>
    <!-- ── TOPBAR ── -->
    <header class="topbar">
      <a href="index.html" class="topbar-logo">
        <img src="assets/image/logo.svg" alt="SOT Logo" />
        <span>SOT</span>
      </a>
      <div class="topbar-right">
        <a href="index.html" class="back-home"
          ><i class="fas fa-arrow-left"></i>
          <span data-i18n="profile_back">Back to Home</span>
        </a>
        <div class="topbar-greeting">
          <span data-i18n="profile_welcome">Welcome,</span>
          <strong id="topbar-username"> Admin</strong>
        </div>
        <a href="admin-dashboard.html" class="topbar-avatar"
          ><i class="fas fa-user-shield"></i
        ></a>
        <div class="notification-dropdown">
          <button class="notification-btn" onclick="toggleNotification(event)">
            <i class="fas fa-bell"></i>
            <span class="notification-badge"></span>
          </button>
          <div class="notification-content" id="notificationMenu">
            <div class="notification-header" data-i18n="notification_title">
              Notifications
            </div>
            <div class="notification-list">
              <div class="notification-empty" data-i18n="notification_empty">
                No new notifications
              </div>
            </div>
          </div>
        </div>
        <button
          id="lang-toggle-btn"
          onclick="toggleLanguage()"
          title="Switch to Vietnamese"
        >
          <span class="lang-flag">🇻🇳</span>
          <span class="lang-label">VI</span>
        </button>
      </div>
    </header>

    <!-- ── LAYOUT ── -->
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar-wrap">
            <i class="fas fa-user-shield"></i>
          </div>
          <div class="sidebar-name" id="sidebar-username">Loading…</div>
          <div class="sidebar-role" id="sidebar-role">ADMIN</div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label" data-i18n="sidebar_overview">
            Overview
          </div>
          <button
            class="nav-item"
            onclick="location.href = 'admin-dashboard.html'"
          >
            <i class="fas fa-chart-pie"></i>
            <span data-i18n="sidebar_dashboard">Dashboard</span>
          </button>

          <div class="nav-group-label" data-i18n="sidebar_managements">
            Management
          </div>
          <button class="nav-item" onclick="location.href = 'admin-rooms.html'">
            <i class="fas fa-bed"></i>
            <span data-i18n="sidebar_rooms">Rooms</span>
          </button>
          <button
            class="nav-item"
            onclick="location.href = 'admin-bookings.html'"
          >
            <i class="fas fa-calendar-check"></i>
            <span data-i18n="sidebar_bookings">Bookings</span>
          </button>
          <button class="nav-item" onclick="location.href = 'admin-users.html'">
            <i class="fas fa-users"></i>
            <span data-i18n="sidebar_users">Users</span>
          </button>

          <div class="sidebar-divider"></div>
          <div class="nav-group-label" data-i18n="sidebar_finances_feedback">
            Finance & Feedback
          </div>
          <button
            class="nav-item"
            onclick="location.href = 'admin-payments.html'"
          >
            <i class="fas fa-credit-card"></i>
            <span data-i18n="sidebar_payments">Payments</span>
          </button>
          <button
            class="nav-item"
            onclick="location.href = 'admin-refunds.html'"
          >
            <i class="fas fa-undo"></i>
            <span data-i18n="sidebar_refundRequests">Refund Requests</span>
          </button>
          <button
            class="nav-item"
            onclick="location.href = 'admin-reviews.html'"
          >
            <i class="fas fa-star"></i>
            <span data-i18n="sidebar_reviews">Room Reviews</span>
          </button>
          <button class="nav-item" onclick="location.href = 'admin-chat.html'">
            <i class="fas fa-comments"></i>
            <span data-i18n="sidebar_livechat">Live Chat</span>
            <span id="sidebar-unread-badge" class="sidebar-unread-badge"></span>
          </button>

          <div class="sidebar-divider"></div>
          <button
            class="nav-item danger"
            onclick="AdminDashboard.handleLogout()"
          >
            <i class="fas fa-sign-out-alt"></i>
            <span data-i18n="sidebar_logout">Sign Out</span>
          </button>
        </nav>
      </aside>

      <!-- ── MAIN ── -->
      <main class="main" style="display: flex">
        <div class="chat-layout">
          <!-- LEFT: Conversation list -->
          <div class="conv-pane" id="conv-pane">
            <div class="conv-pane-header">
              <h2>
                <i
                  class="fas fa-comments"
                  style="
                    color: var(--primary);
                    margin-right: 8px;
                    font-size: 0.95rem;
                  "
                ></i><span data-i18n="admin_chat_title">
                Live Chat Support
              </h2>
              <div class="conv-search">
                <i class="fas fa-search"></i>
                <input
                  type="text"
                  id="conv-search-input"
                  placeholder="Search conversations…" data-i18n="admin_chat_search_ph"
                />
              </div>
            </div>

            <div class="conv-list" id="conv-list">
              <div class="conv-empty" id="conv-empty">
                <i
                  class="fas fa-inbox"
                  style="
                    font-size: 2rem;
                    color: rgba(201, 160, 80, 0.3);
                    display: block;
                    margin-bottom: 10px;
                  "
                ></i><span data-i18n="admin_chat_no_conv">
                No conversations yet
              </div>
            </div>
          </div>

          <!-- RIGHT: Chat view -->
          <div class="chat-pane" id="chat-pane">
            <!-- Empty state -->
            <div class="chat-pane-empty" id="chat-empty-state">
              <i class="fas fa-comment-dots"></i>
              <p data-i18n="admin_chat_select_msg">Select a conversation to start chatting</p>
            </div>

            <!-- Active conversation -->
            <div
              id="chat-active"
              style="
                display: none;
                flex-direction: column;
                flex: 1;
                overflow: hidden;
              "
            >
              <div class="chat-header">
                <button
                  class="chat-back-btn"
                  id="chat-back-btn"
                  onclick="showConvPane()"
                >
                  <i class="fas fa-arrow-left"></i>
                </button>
                <div class="chat-header-avatar" id="chat-header-avatar">?</div>
                <div class="chat-header-info">
                  <div class="chat-header-name" id="chat-header-name">
                    Guest
                  </div>
                  <div class="chat-header-status" id="chat-header-status">
                    Online
                  </div>
                </div>
                <div class="chat-header-actions">
                  <button
                    class="chat-header-btn"
                    title="Mark as resolved"
                    onclick="resolveConversation()"
                  >
                    <i class="fas fa-check-double"></i>
                  </button>
                  <button
                    class="chat-header-btn"
                    title="Delete conversation"
                    onclick="deleteConversation()"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </div>

              <div class="chat-messages" id="chat-messages"></div>

              <div class="chat-input-bar">
                <textarea
                  id="admin-reply-input"
                  placeholder="Type a reply…"
                  rows="1"
                  onkeydown="handleReplyKey(event)"
                ></textarea>
                <button
                  class="send-btn"
                  id="send-btn"
                  onclick="sendAdminReply()"
                >
                  <i class="fas fa-paper-plane"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Mobile sidebar overlay + toggle -->
    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="closeSidebar()"
    ></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <script src="script/api/baseApi.js"></script>
    <script src="script/authStore.js"></script>
    <script src="script/guard.js"></script>
    <script src="script/app-shell.js"></script>
    <script src="script/admin-chat.js"></script>
    <script src="script/language.js"></script>
  </body>
</html>
