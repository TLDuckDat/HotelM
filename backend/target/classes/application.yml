spring:
  application:
    name: HotelM

  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000 # 5 giây để thiết lập kết nối ban đầu
          timeout: 5000           # 5 giây để đợi phản hồi dữ liệu
          writetimeout: 5000      # 5 giây để gửi dữ liệu đi

otp:
  expiry-seconds: 300

server:
  port: 8080

hotel:
  upload-dir: uploads

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

cloudinary:
  url: ${CLOUDINARY_URL}

rate-limit:
  enabled: true
  api:
    capacity: 100
    refill-tokens: 100
    refill-duration-seconds: 60


