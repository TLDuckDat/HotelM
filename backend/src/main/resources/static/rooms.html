<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - SOT Resort & Hotel</title>

    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="assets/css/profile.css" />
</head>

<body>

    <header class="topbar">
        <a href="index.html" class="topbar-logo">
            <img src="assets/image/logo.svg" alt="SOT Logo">
            <span>SOT</span>
        </a>
        <div class="topbar-right">
            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="topbar-greeting">Welcome, <strong id="topbar-username">...</strong></div>
            <a href="account.html" class="topbar-avatar"><i class="fas fa-user"></i></a>
        </div>
    </header>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-user">
                <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
                <div class="sidebar-name" id="sidebar-username">Loading…</div>
                <div class="sidebar-role" id="sidebar-role">—</div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item" onclick="location.href='account.html'">
                    <i class="fas fa-user-circle"></i> My Account
                </button>
                <!-- <button class="nav-item" onclick="location.href='dashboard.html'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button> -->
                <button class="nav-item" onclick="location.href='bookings.html'">
                    <i class="fas fa-calendar-check"></i> My Bookings
                </button>
                <button class="nav-item active">
                    <i class="fas fa-bed"></i> Browse Rooms
                </button>

                <div class="sidebar-divider"></div>

                <button class="nav-item" onclick="location.href='payments.html'">
                    <i class="fas fa-credit-card"></i> Payments
                </button>
                <button class="nav-item" onclick="location.href='refunds.html'">
                    <i class="fas fa-undo"></i> Refund Requests
                </button>
                <button class="nav-item" onclick="location.href='reviews.html'">
                    <i class="fas fa-star"></i> Room Reviews
                </button>

                <div class="sidebar-divider"></div>

                <button class="nav-item danger" onclick="RoomsPage.handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> Sign Out
                </button>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div class="page-header">
                <h1>Browse Rooms</h1>
                <p>View all available room types</p>
            </div>

            <div class="card filter-card" style="padding: 24px !important;">
                <div id="toggle-filter"
                    style="cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
                    <div class="card-title" style="margin-bottom: 0; font-size: 1.1rem;">
                        <i class="fas fa-filter" style="margin-right: 8px;"></i> Bộ lọc tìm kiếm
                    </div>
                    <i class="fas fa-chevron-up" id="filter-chevron"
                        style="transition: 0.3s; color: var(--primary);"></i>
                </div>

                <div id="filter-container" style="transition: all 0.3s ease;">
                    <form id="filter-form"
                        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 24px; margin-top: 20px; align-items: end;">

                        <div class="form-field">
                            <label class="form-label" style="display: block; margin-bottom: 10px;">Loại phòng</label>
                            <select id="filter-type" class="form-select">
                                <option value="">Tất cả loại phòng</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label class="form-label" style="display: block; margin-bottom: 10px;">Sức chứa</label>
                            <input type="number" id="filter-capacity" class="form-input" placeholder="Số người..."
                                min="1">
                        </div>

                        <div class="form-field">
                            <label class="form-label" style="display: block; margin-bottom: 10px;">Khoảng giá</label>
                            <select id="filter-price" class="form-select">
                                <option value="">Tất cả giá</option>
                                <option value="0-500000">Dưới 500.000đ</option>
                                <option value="500000-1000000">500k - 1 triệu</option>
                                <option value="1000000-999999999">Trên 1 triệu</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label class="form-label" style="display: block; margin-bottom: 10px;">Đánh giá</label>
                            <select id="filter-rating" class="form-select">
                                <option value="">Tất cả đánh giá</option>
                                <option value="5">5 sao</option>
                                <option value="4">4 sao trở lên</option>
                                <option value="3">3 sao trở lên</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <button type="button" id="btn-reset" class="btn-secondary"
                                style="width: 100%; height: 42px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                                <i class="fas fa-redo-alt" style="font-size: 0.8rem;"></i> Xóa lọc
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="rooms-list" class="rooms-grid">
                <!-- JS render tại đây -->
            </div>

        </main>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <!-- Scripts -->
    <script src="script/api/baseApi.js"></script>
    <script src="script/api/roomApi.js"></script>
    <script src="script/api/roomTypeApi.js"></script>
    <script src="script/api/userApi.js"></script>

    <script src="script/authStore.js"></script>
    <script src="script/guard.js"></script>

    <script src="script/rooms.js"></script>

</body>

</html>
