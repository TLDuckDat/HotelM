<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payments - SOT Resort & Hotel</title>
    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/profile.css" />
  </head>

  <body>
    <header class="topbar">
      <a href="index.html" class="topbar-logo">
        <img src="assets/image/logo.svg" alt="SOT Logo" />
        <span>SOT</span>
      </a>
      <div class="topbar-right">
        <a href="index.html" class="back-home"
          ><i class="fas fa-arrow-left"></i
          ><span data-i18n="profile_back">Back to Home</span></a
        >
        <div class="topbar-greeting">
          <span data-i18n="profile_welcome">Welcome,</span>
          <strong id="topbar-username">Guest</strong>
        </div>
        <a href="account.html" class="topbar-avatar"
          ><i class="fas fa-user"></i
        ></a>

        <div class="notification-dropdown">
          <button class="notification-btn" onclick="toggleNotification(event)">
            <i class="fas fa-bell"></i>
            <span class="notification-badge"></span>
          </button>
          <div class="notification-content" id="notificationMenu">
            <div class="notification-header" data-i18n="notification_header">
              Notifications
            </div>
            <div class="notification-list">
              <div class="notification-empty" data-i18n="notification_empty">
                No new notifications
              </div>
            </div>
          </div>
        </div>
        <button
          id="lang-toggle-btn"
          onclick="toggleLanguage()"
          title="Switch to Vietnamese"
        >
          <span class="lang-flag">🇻🇳</span>
          <span class="lang-label">VI</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
          <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
          <div class="sidebar-name" id="sidebar-username">Loading…</div>
          <div class="sidebar-role" id="sidebar-role">—</div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item" onclick="location.href = 'account.html'">
            <i class="fas fa-user-circle"></i
            ><span data-i18n="sidebar_account">My Account</span>
          </button>
          <!-- <button class="nav-item" onclick="location.href='dashboard.html'">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button> -->
          <button class="nav-item" onclick="location.href = 'bookings.html'">
            <i class="fas fa-calendar-check"></i>
            <span data-i18n="sidebar_bookings">My Bookings</span>
          </button>
          <button class="nav-item" onclick="location.href = 'rooms.html'">
            <i class="fas fa-bed"></i>
            <span data-i18n="sidebar_rooms">Browse Rooms</span>
          </button>

          <div class="sidebar-divider"></div>

          <button class="nav-item" onclick="location.href = 'payments.html'">
            <i class="fas fa-credit-card"></i>
            <span data-i18n="sidebar_payments">Payments</span>
          </button>
          <button class="nav-item" onclick="location.href = 'refunds.html'">
            <i class="fas fa-undo"></i>
            <span data-i18n="sidebar_refunds">Refund Requests</span>
          </button>
          <button class="nav-item" onclick="location.href = 'reviews.html'">
            <i class="fas fa-star"></i>
            <span data-i18n="sidebar_reviews">Room Reviews</span>
          </button>

          <div class="sidebar-divider"></div>
          <button class="nav-item danger" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i>
            <span data-i18n="sidebar_signout">Sign Out</span>
          </button>
        </nav>
      </aside>

      <main class="main">
        <div class="page-header">
          <div>
            <h1 data-i18n="payments_title">Payments</h1>
            <p data-i18n="payments_desc">Track and submit your payment records</p>
          </div>
        </div>

        <div class="pay-stats">
          <div class="pay-stat-card">
            <div class="pay-stat-icon"><i class="fas fa-receipt"></i></div>
            <div>
              <div class="pay-stat-label" data-i18n="payments_stat_total">Total Payments</div>
              <div class="pay-stat-value" id="stat-total">—</div>
            </div>
          </div>
          <div class="pay-stat-card">
            <div class="pay-stat-icon"><i class="fas fa-check-circle"></i></div>
            <div>
              <div class="pay-stat-label" data-i18n="payments_stat_completed">Completed</div>
              <div class="pay-stat-value" id="stat-completed">—</div>
            </div>
          </div>
          <div class="pay-stat-card">
            <div class="pay-stat-icon"><i class="fas fa-coins"></i></div>
            <div>
              <div class="pay-stat-label" data-i18n="payments_stat_total_amount">Total Paid</div>
              <div class="pay-stat-value" id="stat-amount">—</div>
            </div>
          </div>
        </div>

        <div class="profile-grid">
          <div class="card" style="align-self: start">
            <div class="card-title">
              <i class="fas fa-plus-circle"></i>  <span data-i18n="new_payment">New Payment</span>
            </div>
            <div
              id="payments-message"
              class="notice"
              style="display: none"
            ></div>

            <div class="form-group" style="margin-top: 20px">
              <label class="form-label" data-i18n="label_booking">Booking</label>
              <select class="form-input" id="payment-booking-id" required>
                <option value="">Select a booking…</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="label_method">Payment Method</label>
              <select class="form-input" id="payment-method" required>
                <option value="CARD">💳 Card</option>
                <option value="BANK_TRANSFER">🏦 Bank Transfer</option>
                <option value="CASH">💵 Cash</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="label_amount">Amount</label>
              <input
                class="form-input"
                id="payment-amount"
                type="number"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <button class="btn-primary" id="payment-submit-btn" type="button">
              <i class="fas fa-paper-plane"></i> <span data-i18n="btn_submit_payment">Submit Payment</span>
            </button>
          </div>

          <div class="card">
            <div class="card-title">
              <i class="fas fa-list-ul"></i>  <span data-i18n="payments_col">My Payments</span>
            </div>
            <div class="table-wrap" style="margin-top: 20px">
              <table class="data-table">
                <thead>
                  <tr>
                    <th data-i18n="payments_col_id">ID</th>
                    <th data-i18n="payments_col_booking">Booking</th>
                    <th data-i18n="payments_col_amount">Amount</th>
                    <th data-i18n="payments_col_method">Method</th>
                    <th data-i18n="payments_col_status">Status</th>
                  </tr>
                </thead>
                <tbody id="payments-body">
                  <tr>
                    <td colspan="5">Loading…</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      onclick="closeSidebar()"
    ></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>

    <script src="/script/api/baseApi.js"></script>
    <script src="/script/api/bookingApi.js"></script>
    <script src="/script/api/paymentApi.js"></script>
    <script src="/script/authStore.js"></script>
    <script src="/script/guard.js"></script>
    <script src="script/app-shell.js"></script>
    <script src="/script/payments.js"></script>
    <script src="/script/language.js"></script>
  </body>
</html>
