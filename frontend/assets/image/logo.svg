<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="rosalia-gold" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#D4B56A"/>
      <stop offset="50%" stop-color="#C9A050"/>
      <stop offset="100%" stop-color="#A8863E"/>
    </linearGradient>
  </defs>
  <!-- Six-fold geometric mark: interlocking arcs (flower-of-life style), scales cleanly -->
  <g stroke="url(#rosalia-gold)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="32" r="16"/>
    <g transform="rotate(60 50 50)"><circle cx="50" cy="32" r="16"/></g>
    <g transform="rotate(120 50 50)"><circle cx="50" cy="32" r="16"/></g>
    <g transform="rotate(180 50 50)"><circle cx="50" cy="32" r="16"/></g>
    <g transform="rotate(240 50 50)"><circle cx="50" cy="32" r="16"/></g>
    <g transform="rotate(300 50 50)"><circle cx="50" cy="32" r="16"/></g>
  </g>
  <circle cx="50" cy="50" r="5.5" fill="none" stroke="url(#rosalia-gold)" stroke-width="2"/>
</svg>
