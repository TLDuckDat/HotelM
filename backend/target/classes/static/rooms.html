<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rooms - SOT Resort & Hotel</title>

  <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <link rel="stylesheet" href="assets/css/profile.css" />
  <link rel="stylesheet" href="assets/css/home.css" />
  <link rel="stylesheet" href="assets/css/rooms.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header id="main-header" class="scrolled">
    <div class="container nav-container">
      <div class="logo">
        <a href="index.html" class="logo-link" aria-label="SOT Resort — trang chủ">
          <img src="assets/image/logo.svg" class="logo-img" width="48" height="48" alt="">
          <span class="logo-wordmark">SOT</span>
        </a>
      </div>
      <nav class="desktop-nav">
                <a href="index.html" data-i18n="nav_home">HOME</a>
                <a href="rooms.html" data-i18n="nav_rooms">ROOMS</a>
                <a href="rosalia-service.html" data-i18n="nav_service">SERVICE</a>
                <a href="rosalia-about.html" data-i18n="nav_about">ABOUT US</a>
                <a href="offer.html" data-i18n="nav_offer">OFFER</a>
            </nav>

      <div class="nav-actions" id="nav-actions">
        <button id="lang-toggle-btn" onclick="toggleLanguage()" title="Switch to Vietnamese">
          <span class="lang-flag">🇻🇳</span>
          <span class="lang-label">VI</span>
        </button>
        <button class="btn-nav-outline" id="btn-login" onclick="openLoginModal()" data-i18n data-i18n="nav_signin">SIGN IN</button>
        <button class="btn-nav-primary" id="btn-register" onclick="openRegisterModal()" data-i18n data-i18n="nav_booknow">BOOK NOW</button>
      </div>

      <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    </div>
  </header>

  <div id="auth-modals-placeholder"></div>

  <div class="layout">
    <!-- MAIN -->
    <main class="main">
      <div class="page-header">
        <h1 data-i18n="rooms_title">Search Rooms</h1>
        <p data-i18n="rooms_desc">Search and filter rooms for your stay</p>
      </div>

      <div class="rooms-layout">
        <aside class="rooms-sidebar">
          <div class="card filter-card">
            <div id="toggle-filter" class="toggle-filter">
              <div class="card-title filter-card-title">
                <i class="fas fa-filter"></i> <span data-i18n="filter_title">Filter</span>
              </div>
              <i class="fas fa-chevron-up" id="filter-chevron" class="filter-chevron"></i>
            </div>

            <div id="filter-container" class="filter-container">
              <form id="filter-form" class="filter-form">
                <div class="form-field full-width">
                  <label class="form-label" data-i18n="filter_search">Search</label>
                  <input type="text" id="filter-keyword" class="form-input"
                    placeholder="Search by room name..." data-i18n="filter_search_placeholder" />
                </div>
                <div class="form-field full-width">
                  <label class="form-label" data-i18n="filter_type">Room Type</label>
                  <select id="filter-type" class="form-select">
                    <option value="" data-i18n="filter_type_all">All Room Types</option>
                  </select>
                </div>

                <div class="form-field">
                  <label class="form-label" data-i18n="filter_capacity">Capacity</label>
                  <input type="number" id="filter-capacity" class="form-input"
                    placeholder="Guests..." min="1" data-i18n="filter_capacity_placeholder" />
                </div>

                <div class="form-field">
                  <label class="form-label" data-i18n="filter_rating">Rating</label>
                  <select id="filter-rating" class="form-select">
                    <option value="" data-i18n="filter_rating_all">All</option>
                    <option value="5" data-i18n="filter_rating_5">5 Stars</option>
                    <option value="4" data-i18n="filter_rating_4">4+ Stars</option>
                    <option value="3" data-i18n="filter_rating_3">3+ Stars</option>
                  </select>
                </div>

                <div class="form-field full-width">
                  <label class="form-label" data-i18n="filter_price">Price Range</label>
                  <select id="filter-price" class="form-select">
                    <option value="" data-i18n="filter_price_all">All Prices</option>
                    <option value="0-500000" data-i18n="filter_price_1">Under 500,000 VND</option>
                    <option value="500000-1000000" data-i18n="filter_price_2">
                      500,000 - 1,000,000 VND
                    </option>
                    <option value="1000000-999999999" data-i18n="filter_price_over">Over 1,000,000 VND</option>
                  </select>
                </div>

                <div class="form-field btn-reset-wrapper">
                  <button type="button" id="btn-reset" class="btn-secondary btn-reset">
                    <i class="fas fa-redo-alt"></i> <span data-i18n="filter_reset">Reset Filters</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </aside>

        <div class="rooms-content">
          <div id="rooms-list" class="rooms-grid">
            <!-- JS render tại đây -->
          </div>
          <nav id="rooms-pagination" class="rooms-pagination" aria-label="Room list pages"></nav>
        </div>
      </div>
    </main>
  </div>

  <footer>
    <div class="container">
      <div class="newsletter">
        <h3 data-i18n="footer_newsletter">Subscribe to our e-newsletter:</h3>
        <form id="newsletter-form">
          <input type="email" placeholder="Your email address" required data-i18n="footer_subscribe">
          <button type="submit" data-i18n="footer_subscribe">SUBSCRIBE</button>
        </form>
      </div>
      <div class="contact-info">
        <p data-i18n="footer_address">448 Le Van Viet, Tang Nhon Phu A, TP Ho Chi Minh</p>
        <p data-i18n="footer_phone">0336374498 | dinhgiang19092k6@gmail.com</p>
      </div>
      <div class="copyright">
        <p data-i18n="footer_copyright">© 2026 SOT. All rights reserved</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

  <script src="script/api/baseApi.js"></script>
  <script src="script/api/roomApi.js"></script>
  <script src="script/api/roomTypeApi.js"></script>
  <script src="script/api/userApi.js"></script>
  <script src="script/api/notificationApi.js"></script>

  <script src="script/authStore.js"></script>
  <script src="script/auth-modals.js"></script>
  <script src="script/notification-manager.js"></script>

  <script src="script/rooms.js"></script>
  <script src="script/language.js"></script>
</body>

</html>
