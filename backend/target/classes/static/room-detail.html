<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Detail – SOT Resort &amp; Hotel</title>
    <link rel="icon" href="assets/image/logo.svg" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/room-detail.css" />
</head>
<body>

    <!-- ══ TOPBAR ══ -->
    <header class="topbar">
        <a href="index.html" class="topbar-logo">
            <img src="assets/image/logo.svg" alt="SOT Logo" />
            <span>SOT</span>
        </a>
        <div class="topbar-right">
            <a href="rooms.html" class="back-home">
                <i class="fas fa-arrow-left"></i>
                <span data-i18n="profile_back">Back to Rooms</span>
            </a>
            <div class="topbar-greeting">
                <span data-i18n="profile_welcome">Welcome,</span>
                <strong id="topbar-username">Guest</strong>
            </div>
            <a href="account.html" class="topbar-avatar"><i class="fas fa-user"></i></a>

            <div class="notification-dropdown">
                <button class="notification-btn" onclick="toggleNotification(event)">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge"></span>
                </button>
                <div class="notification-content" id="notificationMenu">
                    <div class="notification-header" data-i18n="notification_header">Notifications</div>
                    <div class="notification-list">
                        <div class="notification-empty" data-i18n="notification_empty">No new notifications</div>
                    </div>
                </div>
            </div>

            <button id="lang-toggle-btn" onclick="toggleLanguage()" title="Switch language">
                <span class="lang-flag">🇻🇳</span>
                <span class="lang-label">VI</span>
            </button>
        </div>
    </header>

    <!-- ══ LAYOUT ══ -->
    <div class="layout">

        <!-- ── SIDEBAR ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-user">
                <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
                <div class="sidebar-name" id="sidebar-username">Loading…</div>
                <div class="sidebar-role" id="sidebar-role">—</div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" onclick="location.href='account.html'">
                    <i class="fas fa-user-circle"></i>
                    <span data-i18n="sidebar_account">My Account</span>
                </button>
                <button class="nav-item" onclick="location.href='bookings.html'">
                    <i class="fas fa-calendar-check"></i>
                    <span data-i18n="sidebar_bookings">My Bookings</span>
                </button>
                <button class="nav-item active" onclick="location.href='rooms.html'">
                    <i class="fas fa-bed"></i>
                    <span data-i18n="sidebar_rooms">Browse Rooms</span>
                </button>
                <div class="sidebar-divider"></div>
                <button class="nav-item" onclick="location.href='payments.html'">
                    <i class="fas fa-credit-card"></i>
                    <span data-i18n="sidebar_payments">Payments</span>
                </button>
                <button class="nav-item" onclick="location.href='refunds.html'">
                    <i class="fas fa-undo"></i>
                    <span data-i18n="sidebar_refunds">Refund Requests</span>
                </button>
                <button class="nav-item" onclick="location.href='reviews.html'">
                    <i class="fas fa-star"></i>
                    <span data-i18n="sidebar_reviews">Room Reviews</span>
                </button>
                <div class="sidebar-divider"></div>
                <button class="nav-item danger" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="sidebar_signout">Sign Out</span>
                </button>
            </nav>
        </aside>

        <!-- ── MAIN ── -->
        <main class="main" id="main-content">
            <!-- JS renders everything here -->
        </main>

    </div><!-- /.layout -->

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <!-- Scripts -->
    <script src="script/api/baseApi.js"></script>
    <script src="script/api/roomApi.js"></script>
    <script src="script/api/roomTypeApi.js"></script>
    <script src="script/api/userApi.js"></script>
    <script src="script/authStore.js"></script>
    <script src="script/guard.js"></script>
    <script src="script/app-shell.js"></script>
    <script src="script/room-detail.js"></script>
    <script src="script/language.js"></script>
</body>
</html>
