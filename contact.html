<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - HotelM</title>
    <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
<div id="app-topbar"></div>
<div class="container">
    <h2>Contact</h2>
    <div id="contact-message" class="notice">Send contact request to hotel team.</div>
    <div class="card">
        <form id="contact-form">
            <label for="contact-name">Name</label>
            <input id="contact-name" required />

            <label for="contact-email">Email</label>
            <input id="contact-email" type="email" required />

            <label for="contact-content">Message</label>
            <textarea id="contact-content" rows="4" required></textarea>

            <button class="primary" type="submit">Submit</button>
        </form>
    </div>
</div>

<script src="script/authStore.js"></script>
<script src="script/app-shell.js"></script>
<script src="script/contact.js"></script>
<script>
    window.AppShell.renderTopbar("Contact");
</script>
</body>
</html>
