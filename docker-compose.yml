version: '3.8'

services:
  mysql:
    image: mysql:oracle
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: HOTELM_DB
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
volumes:
  mysql_data: