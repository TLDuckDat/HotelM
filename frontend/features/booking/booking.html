<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Bookings - SOT Resort & Hotel</title>
    <link rel="icon" href="/assets/image/logo.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/profile.css" />
</head>
<body>

<header class="topbar">
    <a href="../../pages/index.html" class="topbar-logo">
        <img src="/assets/image/logo.svg" alt="SOT Logo">
        <span>SOT</span>
    </a>
    <div class="topbar-right">
        <a href="../../pages/index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="topbar-greeting">Welcome, <strong id="topbar-username">Guest</strong></div>
        <a href="../account/account.html" class="topbar-avatar"><i class="fas fa-user"></i></a>
    </div>
</header>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-user">
            <div class="sidebar-avatar-wrap"><i class="fas fa-user"></i></div>
            <div class="sidebar-name" id="sidebar-username">Loading…</div>
            <div class="sidebar-role" id="sidebar-role">—</div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item" onclick="location.href='account.html'"><i class="fas fa-user-circle"></i> My Account</button>
            <button class="nav-item" onclick="location.href='dashboard.html'"><i class="fas fa-chart-line"></i> Dashboard</button>
            <button class="nav-item active"><i class="fas fa-calendar-check"></i> My Bookings</button>
            <button class="nav-item" onclick="location.href='rooms.html'"><i class="fas fa-bed"></i> Browse Rooms</button>
            <div class="sidebar-divider"></div>
            <button class="nav-item danger" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1>My Bookings</h1>
            <p>View and manage your reservations</p>
        </div>

        <div id="bookings-message" class="message-box"></div>

        <div class="card" style="padding:0; overflow:hidden;">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Room</th>
                            <th>Check In</th>
                            <th>Check Out</th>
                            <th>Status</th>
                            <th>Action</th>
                            <th>Review</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body">
                        <tr><td colspan="6" class="loading">Loading bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn-primary" onclick="location.href='create-booking.html'" style="padding:12px 24px;">
                <i class="fas fa-plus"></i> Create New Booking
            </button>
        </div>
    </main>
</div>

<div class="modal-backdrop" id="review-modal-backdrop">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-header-left">
                <div class="modal-title">Leave a Review</div>
                <div class="modal-subtitle" id="review-modal-room-name">Room —</div>
            </div>
            <button class="modal-close" onclick="closeReviewModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="review-booking-id" />
            <input type="hidden" id="review-user-id" />
            <input type="hidden" id="review-room-id" />
            <div class="form-field">
                <label class="form-label">Rating</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="review-rating" value="5" /><label for="star5">&#9733;</label>
                    <input type="radio" id="star4" name="review-rating" value="4" /><label for="star4">&#9733;</label>
                    <input type="radio" id="star3" name="review-rating" value="3" /><label for="star3">&#9733;</label>
                    <input type="radio" id="star2" name="review-rating" value="2" /><label for="star2">&#9733;</label>
                    <input type="radio" id="star1" name="review-rating" value="1" /><label for="star1">&#9733;</label>
                </div>
            </div>
            <div class="form-field" style="margin-top: 18px;">
                <label class="form-label">Comment</label>
                <textarea id="review-comment" class="form-textarea" rows="4" placeholder="Share your experience..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" onclick="submitReview()">Submit Review</button>
            <button class="btn-secondary" onclick="closeReviewModal()">Cancel</button>
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<script src="/script/api/baseApi.js"></script>
<script src="/script/api/roomApi.js"></script>
<script src="/script/api/bookingApi.js"></script>
<script src="/script/api/reviewApi.js"></script>
<script src="/script/authStore.js"></script>
<script src="/script/guard.js"></script>
<script src="/script/booking.js"></script>

</body>
</html>
